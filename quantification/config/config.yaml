# 量化软件配置

# 数据源配置
data_sources:
  yahoo_finance:
    enabled: true
    cache_days: 7
    
  alpha_vantage:
    enabled: false
    api_key: "YOUR_API_KEY"
    rate_limit: 5  # 每分钟请求次数
    
  database:
    enabled: false
    type: "postgresql"
    host: "localhost"
    port: 5432
    database: "quant_db"
    username: "quant_user"
    password: "quant_password"

# 回测配置
backtest:
  initial_capital: 100000.0  # 初始资金
  commission: 0.001  # 手续费率
  slippage: 0.001  # 滑点
  start_date: "2020-01-01"
  end_date: "2023-12-31"
  frequency: "daily"  # daily, hourly, minute
  
# 风险管理
risk_management:
  max_position_size: 0.1  # 最大仓位比例
  stop_loss: 0.05  # 止损比例
  take_profit: 0.15  # 止盈比例
  max_drawdown: 0.2  # 最大回撤限制
  
# 策略参数
strategies:
  moving_average:
    enabled: true
    short_window: 20
    long_window: 50
    
  bollinger_bands:
    enabled: true
    window: 20
    num_std: 2
    
  rsi:
    enabled: true
    period: 14
    oversold: 30
    overbought: 70
    
  macd:
    enabled: true
    fast_period: 12
    slow_period: 26
    signal_period: 9

# 日志配置
logging:
  level: "INFO"
  file: "logs/quant_studio.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
# 缓存配置
cache:
  enabled: true
  directory: "data/cache"
  ttl_days: 30
  
# 可视化配置
visualization:
  theme: "dark"
  color_palette: "viridis"
  figure_size: [12, 8]
  
# 性能指标
metrics:
  calculate_sharpe: true
  calculate_sortino: true
  calculate_max_drawdown: true
  calculate_win_rate: true
  calculate_profit_factor: true